workflows:
  android-release:
    name: ScanBibli APK
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - keystore
    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
