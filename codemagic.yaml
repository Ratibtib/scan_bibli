workflows:
  android-release:
    name: ScanBibli APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - thibault.ramothe@gmail.com
        notify:
          success: true
          failure: true
